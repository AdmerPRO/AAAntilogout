# Main combat settings.
combat:
  enabled: true
  duration-seconds: 20
  refresh-timer-on-hit: true
  ignore-creative-spectator: false
  disabled-worlds:
    - lobby

# Logout punishment. When a tagged player leaves, their inventory is dropped and the player is killed.
punishments:
  logout:
    kill: true
    drop-items: true
    clear-inventory: true
    broadcast: true

# Visual feedback shown while a player is in combat.
visuals:
  bossbar:
    enabled: true
  actionbar:
    enabled: true
  chat-reminder:
    enabled: true
    interval-seconds: 5

# Combat restrictions.
restrictions:
  commands:
    # BLACKLIST blocks listed commands. WHITELIST allows only listed commands.
    mode: BLACKLIST
    list:
      - spawn
      - tpa
      - tpaccept
      - home
      - warp
      - kit
      - ec
      - enderchest
      - fly
  items:
    blocked:
      - ENDER_PEARL
      - CHORUS_FRUIT
      - WIND_CHARGE
      - FIREWORK_ROCKET
  teleport:
    # Use ALL to block every teleport cause during combat.
    blocked-causes:
      - ENDER_PEARL
      - COMMAND
      - PLUGIN
  item-drop:
    block: false
  elytra:
    block: true

# Region protection. WorldGuard is optional; local regions work without it.
regions:
  block-in-combat: true
  # Keep this false if you want PvP hits to always start combat, even near spawn.
  # Region names below still block players from entering those regions while tagged.
  prevent-tagging-inside-blocked-region: false
  blocked:
    - spawn
  worldguard:
    enabled: true
  local-regions:
    spawn:
      world: world
      min: [ -50, -64, -50 ]
      max: [ 50, 320, 50 ]

# Battle history stored in battle-history.yml.
history:
  max-records-per-player: 5000
  page-size: 8
  record-server-stop: true

messages:
  prefix: "&8[&cAAAntylogout&8] &7"
  no-permission: "{prefix}&cYou do not have permission."
  unknown-command: "{prefix}&cUnknown command. Use &f/aaalo help&c."
  reload: "{prefix}&aConfiguration reloaded."
  player-not-online: "{prefix}&cThat player is not online."
  usage-status: "{prefix}&cUsage: &f/aaalo status <player>"
  usage-history: "{prefix}&cUsage: &f/aaalo history <player> [page]"
  usage-stats: "{prefix}&cUsage: &f/aaalo stats <player>"
  usage-end: "{prefix}&cUsage: &f/aaalo end <player>"
  status-safe: "{prefix}&aPlayer &f{player} &ais not in combat."
  history-empty: "{prefix}&cNo battle history found for &f{player}&c."
  combat-start: "{prefix}&cYou are in combat with &f{opponent}&c. Do not log out for &f{seconds}s&c!"
  combat-reminder: "{prefix}&cYou are still in combat. Time left: &f{time}&c. Opponents: &f{opponents}&c."
  combat-end: "{prefix}&aCombat ended. Result: &f{result}&a."
  combat-ended-admin: "{prefix}&aCombat for &f{player} &ahas been ended."
  logout-broadcast: "{prefix}&cPlayer &f{player} &clogged out during combat and was punished."
  command-blocked: "{prefix}&cYou cannot use &f/{command} &cduring combat."
  item-blocked: "{prefix}&cYou cannot use &f{item} &cduring combat."
  teleport-blocked: "{prefix}&cTeleportation is blocked during combat."
  drop-blocked: "{prefix}&cYou cannot drop items during combat."
  region-blocked: "{prefix}&cYou cannot enter this region during combat."
  elytra-blocked: "{prefix}&cElytra is blocked during combat."
  bossbar-title: "&cCombat: &f{time} &8| &7Opponents: &f{opponents}"
  actionbar-title: "&cCombat &8| &f{time} &7left &8| &f{opponents}"
